version: "3.9"

services:
  app:
    build:
      context: .
      args:
        - DEV=true
    image: recepi_app_image
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app
    command: > 
      sh -c "python manage.py wait_for_db &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      - DB_HOST=db
      - DB_NAME=devdb
      - DB_USER=dbuser
      - DB_PASSWORD=Pass123
    depends_on:
      - db


  db:
    image: postgres:13-alpine
    volumes:
      - dev-db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=devdb
      - POSTGRES_USER=dbuser
      - POSTGRES_PASSWORD=Pass123


volumes:
  dev-db-data:
    name: recepi_app_db
